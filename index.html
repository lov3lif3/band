<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOBU</title>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    overflow: hidden;

    /* BACKGROUND IMAGE */
    background: url("amplifier.jpg") center/cover no-repeat;
    position: relative;

    /* SLOW CINEMATIC ZOOM */
    animation: zoom 25s infinite alternate ease-in-out;
  }

  /* DARK + CYBER OVERLAY */
  body::before {
    content: "";
    position: absolute;
    inset: 0;

    background:
      radial-gradient(circle at top, rgba(0,255,255,0.15), transparent 40%),
      radial-gradient(circle at bottom, rgba(255,0,255,0.12), transparent 45%),
      rgba(0,0,0,0.65);

    backdrop-filter: blur(2px);
    z-index: 0;
  }

  /* CONTENT ABOVE OVERLAY */
  h1, p, .player, .btn, .links {
    position: relative;
    z-index: 1;
  }

  /* WOBU (CYBER GLOW) */
  h1 {
    font-size: 48px;
    letter-spacing: 3px;
    text-transform: uppercase;

    text-shadow:
      0 0 10px rgba(0,255,255,0.6),
      0 0 20px rgba(255,0,255,0.4);
  }

  /* TAGLINE */
  p {
    color: #bbb;
    margin-bottom: 25px;
  }

  /* SPOTIFY PLAYER */
  .player {
    width: 100%;
    max-width: 420px;
    margin-bottom: 20px;

    box-shadow:
      0 0 25px rgba(0,255,255,0.15),
      0 0 35px rgba(255,0,255,0.1);
    border-radius: 12px;
  }

  /* MAIN BUTTON */
  .btn {
    display: inline-block;
    background: linear-gradient(90deg, #1DB954, #00ffc8);
    color: black;
    padding: 14px 24px;
    border-radius: 30px;
    font-weight: bold;
    text-decoration: none;
    margin-top: 10px;

    box-shadow: 0 0 20px rgba(0,255,200,0.3);
    transition: 0.2s ease;
  }

  .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,255,200,0.5);
  }

  /* SECONDARY LINKS */
  .links {
    margin-top: 25px;
    font-size: 14px;
  }

  .links a {
    color: #888;
    margin: 0 10px;
    text-decoration: none;
    transition: 0.2s;
  }

  .links a:hover {
    color: #00ffc8;
    text-shadow: 0 0 10px rgba(0,255,200,0.5);
  }

  /* ANIMATIONS */
  @keyframes zoom {
    from { background-size: 100%; }
    to { background-size: 115%; }
  }

  /* MOBILE OPTIMIZATION */
  @media (max-width: 600px) {
    h1 { font-size: 34px; }
    .player { max-width: 100%; }
  }
</style>
</head>

<body>

  <h1>WOBU</h1>

  <p></p>

  <!-- SPOTIFY EMBED (replace link) -->
  <div class="player">
    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/album/5pEj2DFejq24WG0rIiUcsb?utm_source=generator&theme=0&si=5f29fa94232a4fce"
      width="100%" height="152"
      frameBorder="0"
      allowfullscreen=""
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <!-- MAIN ACTION -->
  <a class="btn" href="https://open.spotify.com/artist/5Qr2dE8rgTgOye0aCIFNRu?si=7Np4gEIATHebkE2FbnKUXw" target="_blank">
    ▶ Listen on Spotify
  </a>

  <div class="links">
    <a href="https://instagram.com/wobucity">Instagram</a>
    <a href="https://tiktok.com/@wobucity">TikTok</a>
    <a href="mailto:wobu.mgmt@gmail.com">Booking</a>
  </div>
