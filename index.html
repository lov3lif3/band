<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="WOBU | STHLM/SEOUL">
<meta property="og:description" content="Listen to Amplifier Vol. 1 by WOBU.">
<meta property="og:image" content="https://wobu.world/amplifier.jpg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wobu.world">

<meta name="description" content="STHLM / SEOUL">

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
color: white;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;

padding:
max(20px, env(safe-area-inset-top))
20px
max(20px, env(safe-area-inset-bottom))
20px;

overflow: hidden;

background: url("amplifier.jpg") center/cover no-repeat;
position: relative;

animation: zoom 25s infinite alternate ease-in-out;
}

/* DARK CYBER OVERLAY */
body::before {
content: "";
position: absolute;
inset: 0;

background:
radial-gradient(circle at top, rgba(0,255,255,0.10), transparent 40%),
radial-gradient(circle at bottom, rgba(255,0,255,0.08), transparent 45%),
rgba(0,0,0,0.60);

backdrop-filter: blur(2px);
z-index: 0;
}

/* CONTENT ABOVE OVERLAY */
h1,
p,
.player,
.links,
.cta-container {
position: relative;
z-index: 1;
}

/* DESKTOP BACKGROUND MOTION */
@keyframes zoom {
from {
background-size: 105%;
}
to {
background-size: 112%;
}
}

/* MOBILE BACKGROUND PAN */
@keyframes mobilePan {
0% {
background-size: 220%;
background-position: 30% center;
}

100% {
background-size: 240%;
background-position: 75% center;
}
}

/* MOBILE */
@media (max-width: 600px) {

h1 {
font-size: 34px;
}

.player {
max-width: 100%;
}

.btn,
.secondary-btn {
width: 100%;
box-sizing: border-box;
text-align: center;
font-size: 17px;
}

.links {
font-size: 15px;
}

body {
background-size: 220%;
animation: mobilePan 35s infinite alternate ease-in-out;
}
}

</style>
</head>

<body>

<h1>WOBU</h1>

<!-- GLITCH TAGLINE -->
<p class="tagline glitch" data-text="STHLM / SEOUL">
  STHLM<br>/ SEOUL
</p>

<div class="player">
  <iframe
    style="border-radius:12px"
    src="https://open.spotify.com/embed/album/5pEj2DFejq24WG0rIiUcsb?utm_source=generator&theme=0&si=5f29fa94232a4fce"
    width="100%"
    height="152"
    frameborder="0"
    allowfullscreen=""
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>
</div>

<div class="cta-container">

  <a
    id="main-listen-btn"
    class="btn glitch-btn"
    href="https://open.spotify.com/artist/5Qr2dE8rgTgOye0aCIFNRu?si=7Np4gEIATHebkE2FbnKUXw"
    target="_blank"
  >
    ▶ Listen Now
  </a>

</div>

<div class="links">
  <a href="https://instagram.com/wobucity" target="_blank">Instagram</a>
  <a href="https://tiktok.com/@wobucity" target="_blank">TikTok</a>
  <a href="mailto:wobu.mgmt@gmail.com">Contact</a>
</div>

<script>

const APPLE_MUSIC_URL =
  "https://music.apple.com/se/album/amplifier-vol-1-ep/6778122637";

fetch("https://ipapi.co/json/")
  .then(res => res.json())
  .then(data => {

    if (data.country_code === "JP") {
      const btn = document.getElementById("main-listen-btn");
      btn.href = APPLE_MUSIC_URL;
      btn.innerHTML = " Listen Now";
    }

  })
  .catch(() => {});

</script>

</body>
</html>
